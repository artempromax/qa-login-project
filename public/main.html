<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Фильмотека</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="main-page">

<!-- 🔥 HEADER -->
<header class="header">
  <h2>🎬 Фильмотека</h2>

  <div class="user-menu">
  <div class="user-avatar" id="avatarBtn">👤</div>

  <div id="user-dropdown" class="dropdown">
    <h3>Профиль</h3>

    <p id="user-info"></p>

    <button onclick="logout()">Выйти</button>
  </div>
</div>
    <div id="user-dropdown" class="dropdown">
      <p id="user-info"></p>
      <button onclick="logout()">Выйти</button>
    </div>
  </div>
</header>

<input type="text" id="search" placeholder="🔍 Поиск фильма...">

<h2>🎬 Фильмы</h2>
<div id="movies" class="movies-container"></div>
<h2>❤️ Избранное</h2>
<div id="favorites" class="movies-container"></div>

<!-- 🔥 МОДАЛКА -->
<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <span onclick="closeModal()" class="close">✖</span>
    <img id="modal-img">
    <h2 id="modal-title"></h2>
    <p id="modal-info"></p>
    <br>
    <div class="modal-actions">

  <a id="modal-link"
     target="_blank"
     class="watch-btn"
     onclick="event.stopPropagation()">
     🎬 Смотреть
  </a>

  <a id="modal-trailer"
     target="_blank"
     class="trailer-btn"
     onclick="event.stopPropagation()">
     ▶ Трейлер
  </a>
  </div>
</div>

<script>
function logout() {
  localStorage.removeItem('user');
  window.location.href = "index.html";
}

// 👤 пользователь
const user = JSON.parse(localStorage.getItem('user'));
if(user){
  document.getElementById('user-info').innerHTML = `
<b>👤 ${user.first_name} ${user.last_name}</b><br><br>
📛 Логин: ${user.username}<br>
${user.email ? `📧 Почта: ${user.email}<br>` : `Почта: —<br>`}
🎂 Возраст: ${user.age}
`;
    `${user.first_name} ${user.last_name}<br>${user.email}<br>${user.age} лет`;
}

// dropdown
const avatarBtn = document.getElementById('avatarBtn');
const dropdown = document.getElementById('user-dropdown');

avatarBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  dropdown.classList.toggle('active');
});

window.addEventListener('click', () => {
  dropdown.classList.remove('active');
});

// закрытие при клике вне
window.addEventListener('click', (e) => {
  const menu = document.getElementById('user-dropdown');
  const btn = document.querySelector('.user-menu');

  if (!btn.contains(e.target)) {
    menu.classList.remove('active');
  }
});

// ❤️ избранное
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];

function toggleFavorite(movie) {
  const exists = favorites.find(m => m.title === movie.title);

  if (exists) {
    favorites = favorites.filter(m => m.title !== movie.title);
  } else {
    favorites.push(movie);
  }

  localStorage.setItem('favorites', JSON.stringify(favorites));
  renderFavorites();
  renderMovies(allMovies);
}

// 🎬 модалка
function openModal(movie){
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('modal-img').src = movie.poster;
  document.getElementById('modal-title').textContent = movie.title;
  document.getElementById('modal-info').textContent =
    `Год: ${movie.year} | Рейтинг: ${movie.rating}`;
  document.getElementById('modal-link').href = movie.link;
  document.getElementById('modal-link').innerHTML = "🎥 Смотреть";
  document.getElementById('modal-trailer').href =
  `https://www.youtube.com/results?search_query=${movie.title}+official+trailer`;
}

function closeModal(){
  document.getElementById('modal').style.display = 'none';
}

// 🎬 карточка
function createCard(movie) {
  const isFav = favorites.find(m => m.title === movie.title);

  const card = document.createElement('div');
  card.className = 'movie-card';

  card.innerHTML = `
    <img src="${movie.poster}">
    <div class="title">${movie.title}</div>

    <div class="overlay">
      <p>⭐ ${movie.rating}</p>
      <button onclick='openModal(${JSON.stringify(movie)})'>Подробнее</button>
      <button onclick='event.stopPropagation(); toggleFavorite(${JSON.stringify(movie)})'>
        ${isFav ? "💔" : "❤️"}
      </button>
    </div>
  `;

  return card;
}

// загрузка
let allMovies = [];

fetch('/api/movies')
  .then(res => res.json())
  .then(data => {
    allMovies = data;
    renderMovies(data);
    renderFavorites();
  });

function renderMovies(movies) {
  const container = document.getElementById('movies');
  container.innerHTML = '';
  movies.forEach(m => container.appendChild(createCard(m)));
}

function renderFavorites() {
  const container = document.getElementById('favorites');
  container.innerHTML = '';
  favorites.forEach(m => container.appendChild(createCard(m)));
}

// поиск
document.getElementById('search').addEventListener('input', e => {
  const value = e.target.value.toLowerCase();
  const filtered = allMovies.filter(m =>
    m.title.toLowerCase().includes(value)
  );
  renderMovies(filtered);
});
</script>

</body>
</html>
